name: Rebuild lubricant data

on:
  push:
    paths:
      - "data/raw/**"

permissions:
  contents: write

jobs:
  build-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci

      - run: npm run build:data

      - name: Commit regenerated data if changed
        run: |
          if git diff --quiet -- src/data/lubricants.generated.json src/data/meta.generated.json; then
            echo "No data changes, nothing to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/lubricants.generated.json src/data/meta.generated.json
          git commit -m "chore: regenerate lubricant data from data/raw/"
          git push
